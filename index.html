<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>powerflow — playground</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
      document.documentElement.dataset.theme =
        localStorage.getItem('theme') ||
        (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    </script>
    <link rel="stylesheet" href="./src/playground.css" />
  </head>
  <body>
    <header class="page-header">
      <div>
        <h1>powerflow — playground</h1>
        <p class="sub">
          The same <code>&lt;power-flow&gt;</code> Web Component you'd drop into
          React, Angular, Vue or plain HTML. Drag the sliders or hit "Simulate
          day".
        </p>
      </div>
      <button id="theme-toggle" aria-label="Toggle theme"></button>
    </header>

    <div class="layout">
      <div class="card">
        <div id="action-buttons">
          <button id="get-code">Get code</button>
          <button id="simulate">▶ Simulate day</button>
          <button id="languageBtn">Toggle labels (DE)</button>
          <button id="shuffle-icons">Shuffle icons</button>
          <button id="reset-icons">Reset icons</button>
          <button id="reset-colors">Reset colors</button>
          <button id="copy-link">Copy link</button>
        </div>

        <hr />
        <div class="section-title">Dot speed</div>
        <div class="ctrl">
          <label>Speed <span class="v" id="v-speed"></span></label>
          <input
            id="speed"
            type="range"
            min="0.1"
            max="3"
            step="0.1"
            value="1"
          />
        </div>

        <hr />

        <div class="section-title">Ring colors</div>
        <div class="colors">
          <label>Home <input type="color" id="c-home" value="#818cf8" /></label>
          <label
            >Grid import <input type="color" id="c-grid-in" value="#60a5fa"
          /></label>
          <label
            >Solar <input type="color" id="c-solar" value="#fcd34d"
          /></label>
          <label
            >Grid export <input type="color" id="c-grid-out" value="#f472b6"
          /></label>
          <label
            >Battery charge
            <input type="color" id="c-battery-in" value="#4ade80"
          /></label>
          <label
            >Wallbox <input type="color" id="c-wallbox" value="#22d3ee"
          /></label>
          <label
            >Battery discharge
            <input type="color" id="c-battery-out" value="#fb923c"
          /></label>
          <label
            >Wallbox 2 <input type="color" id="c-wallbox2" value="#2dd4bf"
          /></label>
        </div>

        <hr />
        <div class="ctrl">
          <label>Home load <span class="v" id="v-load"></span></label>
          <input
            id="load"
            type="range"
            min="6700"
            max="14700"
            step="50"
            value="8000"
          />
        </div>
        <div class="ctrl">
          <label
            >Grid (− export / + import) <span class="v" id="v-grid"></span
          ></label>
          <input
            id="grid"
            type="range"
            min="-35000"
            max="35000"
            step="50"
            value="4000"
            disabled
          />
        </div>
        <hr />
        <label class="toggle">
          <input id="has-solar" type="checkbox" checked /> Solar
        </label>
        <div class="ctrl" id="solar-ctrls">
          <label>Solar <span class="v" id="v-solar"></span></label>
          <input
            id="solar"
            type="range"
            min="0"
            max="12000"
            step="50"
            value="3000"
          />
        </div>
        <hr />

        <label class="toggle">
          <input id="has-battery" type="checkbox" checked /> Battery
        </label>
        <div class="ctrl" id="battery-ctrls">
          <label
            >Battery (− charge / + discharge)
            <span class="v" id="v-battery"></span
          ></label>
          <input
            id="battery"
            type="range"
            min="-5000"
            max="5000"
            step="50"
            value="1000"
          />
          <label style="margin-top: 10px"
            >State of Charge (SOC) <span class="v" id="v-soc"></span
          ></label>
          <input id="soc" type="range" min="0" max="100" step="1" value="69" />
        </div>
        <hr />
        <label class="toggle">
          <input id="has-wallbox" type="checkbox" checked /> Wallbox (below
          house)
        </label>
        <div class="ctrl" id="wallbox-ctrls">
          <label>Wallbox <span class="v" id="v-wallbox"></span></label>
          <input
            id="wallbox"
            type="range"
            min="0"
            max="11000"
            step="100"
            value="6400"
          />
        </div>

        <label class="toggle">
          <input id="has-wallbox2" type="checkbox" checked /> Wallbox 2 (above
          house)
        </label>
        <div class="ctrl" id="wallbox2-ctrls">
          <label>Wallbox 2 <span class="v" id="v-wallbox2"></span></label>
          <input
            id="wallbox2"
            type="range"
            min="0"
            max="11000"
            step="100"
            value="300"
          />
        </div>

        <hr />

        <div class="section-title">Test cases</div>
        <div class="row" id="testcases"></div>
      </div>

      <div class="card diagram-card resize">
        <power-flow id="diagram"></power-flow>
        <span
          id="sim-time"
          style="
            position: absolute;
            top: 12px;
            left: 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            pointer-events: none;
            user-select: none;
          "
        ></span>
        <span class="resize-hint">⤡ drag corner to resize</span>
      </div>
    </div>

    <dialog id="code-dialog">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <span style="font-weight: 700; font-size: 15px">Get code</span>
        <button id="close-code" style="padding: 4px 10px">✕</button>
      </div>
      <div class="install-section">
        <div id="pm-tabs"></div>
        <div class="install-cmd-row">
          <code id="install-cmd"></code>
          <button id="copy-install" style="padding:4px 10px; white-space: nowrap; color: #e6edf3; border-color: #e6edf3;">Copy</button>
        </div>
      </div>
      <hr style="margin:0;" />
      <div class="row" id="fw-tabs" style="margin-top: 0"></div>
      <pre id="code-pre"></pre>
      <button id="copy-code" style="width: 100%">Copy code</button>
    </dialog>

    <script type="module" src="./src/playground.ts"></script>
  </body>
</html>
